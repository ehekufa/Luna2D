name: Build Universal Android APK (Luna2D)

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v2

    - name: Install Android NDK & CMake
      run: |
        sdkmanager --install "ndk;25.2.9519653" "cmake;3.22.1"
        echo "ANDROID_NDK_HOME=${ANDROID_SDK_ROOT}/ndk/25.2.9519653" >> $GITHUB_ENV

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libwayland-dev libxkbcommon-dev xorg-dev gcc-multilib g++-multilib

    - name: Clone Dependencies
      run: |
        mkdir -p third_party
        cd third_party
        git clone --depth 1 https://github.com/raysan5/raylib.git
        git clone --depth 1 https://github.com/erincatto/box2d.git
        git clone --depth 1 https://github.com/LuaJIT/LuaJIT.git

    # --- СБОРКА LUAJIT ПОД ВСЕ АРХИТЕКТУРЫ ---
    - name: Build LuaJIT for Multiple ABIs
      run: |
        NDKPATH=$ANDROID_NDK_HOME
        NDKBIN=$NDKPATH/toolchains/llvm/prebuilt/linux-x86_64/bin
        export PATH=$NDKBIN:$PATH
        
        build_luajit() {
          ARCH=$1
          TARGET=$2
          DEST_DIR=$3
          IS_64BIT=$4
          
          cd third_party/LuaJIT
          make clean
          
          if [ "$IS_64BIT" = "true" ]; then
            HOST_COMPILER="gcc"
          else
            HOST_COMPILER="gcc -m32"
          fi
          
          make -j$(nproc) \
            HOST_CC="$HOST_COMPILER" \
            STATIC_CC="$NDKBIN/clang -fPIC" \
            DYNAMIC_CC="$NDKBIN/clang -fPIC" \
            TARGET_LD="$NDKBIN/clang" \
            TARGET_AR="$NDKBIN/llvm-ar rcus" \
            TARGET_STRIP="$NDKBIN/llvm-strip" \
            TARGET_FLAGS="-target $TARGET" \
            TARGET_SYS=Android
            
          mkdir -p ../../luajit_build/$DEST_DIR
          cp src/libluajit.a ../../luajit_build/$DEST_DIR/
          cd ../..
        }

        build_luajit "arm64" "aarch64-linux-android29" "arm64-v8a" "true"
        build_luajit "arm" "armv7a-linux-androideabi29" "armeabi-v7a" "false"
        build_luajit "x86_64" "x86_64-linux-android29" "x86_64" "true"
        build_luajit "x86" "i686-linux-android29" "x86" "false"

    # --- СБОРКА ДВИЖКА ЧЕРЕЗ CMAKE ПОД ВСЕ АРХИТЕКТУРЫ ---
    - name: Build Luna2D Engine for all ABIs
      run: |
        ABIS=("arm64-v8a" "armeabi-v7a" "x86" "x86_64")
        for ABI in "${ABIS[@]}"
        do
          echo "=== Building for ABI: $ABI ==="
          mkdir -p build_$ABI
          cd build_$ABI
          cmake .. \
            -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=$ABI \
            -DANDROID_PLATFORM=android-29 \
            -DPLATFORM=Android \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_EXAMPLES=OFF \
            -DLUAJIT_LIB_DIR=${{ github.workspace }}/luajit_build/$ABI
          make
          cd ..
        done

    # --- СБОРКА И УПАКОВКА УНИВЕРСАЛЬНОГО APK ---
    - name: Package Multi-ABI APK
      run: |
        mkdir -p apk-build/lib/arm64-v8a
        mkdir -p apk-build/lib/armeabi-v7a
        mkdir -p apk-build/lib/x86
        mkdir -p apk-build/lib/x86_64
        
        # Копируем main.lua из корня в ассеты
        mkdir -p apk-build/assets
        cp main.lua apk-build/assets/main.lua
        
        # Копируем библиотеки
        cp build_arm64-v8a/libluna2d.so apk-build/lib/arm64-v8a/libmain.so
        cp build_armeabi-v7a/libluna2d.so apk-build/lib/armeabi-v7a/libmain.so
        cp build_x86/libluna2d.so         apk-build/lib/x86/libmain.so
        cp build_x86_64/libluna2d.so      apk-build/lib/x86_64/libmain.so
        
        # ОПРЕДЕЛЯЕМ ПРАВИЛЬНЫЙ ПУТЬ К MANIFEST:
        # Проверяем, где лежит AndroidManifest.xml (в корне или папке android/)
        if [ -f "AndroidManifest.xml" ]; then
          MANIFEST_PATH="AndroidManifest.xml"
        else
          MANIFEST_PATH="android/AndroidManifest.xml"
        fi
        
        # Линкуем базовый APK с динамическим путем к манифесту
        ${ANDROID_SDK_ROOT}/build-tools/33.0.2/aapt2 link \
          -o luna2d-unaligned.apk \
          -I ${ANDROID_SDK_ROOT}/platforms/android-29/android.jar \
          --manifest $MANIFEST_PATH \
          --min-sdk-version 21 \
          --target-sdk-version 29 \
          --v2-signing-enabled \
          apk-build
          
        # Выравниваем APK
        ${ANDROID_SDK_ROOT}/build-tools/33.0.2/zipalign -f -v 4 luna2d-unaligned.apk Luna2D_Universal_Game.apk
        
        # Генерируем тестовый ключ (добавлен ключ -noprompt для автоматизации сборки)
        keytool -genkey -v -keystore debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US" -noprompt
        
        # Подписываем APK
        ${ANDROID_SDK_ROOT}/build-tools/33.0.2/apksigner sign --ks debug.keystore --ks-pass pass:android --out Luna2D_Universal_Release.apk Luna2D_Universal_Game.apk

    # Отправка готового файла в артефакты сборки GitHub (v4)
    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Luna2D-Universal-APK
        path: Luna2D_Universal_Release.apk
        compression-level: 9
        overwrite: true
