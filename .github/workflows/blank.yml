name: Build Luna2D Android APK

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v2

    - name: Install Android NDK & CMake
      run: |
        sdkmanager --install "ndk;25.2.9519653" "cmake;3.22.1"
        echo "ANDROID_NDK_HOME=${ANDROID_SDK_ROOT}/ndk/25.2.9519653" >> $GITHUB_ENV
        echo "ANDROID_HOME=${ANDROID_SDK_ROOT}" >> $GITHUB_ENV

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          libwayland-dev \
          libxkbcommon-dev \
          xorg-dev \
          gcc-multilib \
          g++-multilib \
          ninja-build

    - name: Create Directory Structure
      run: |
        mkdir -p third_party
        mkdir -p android
        mkdir -p assets

    - name: Clone Dependencies
      run: |
        cd third_party
        git clone --depth 1 https://github.com/raysan5/raylib.git
        git clone --depth 1 https://github.com/erincatto/box2d.git
        git clone --depth 1 https://github.com/LuaJIT/LuaJIT.git

    - name: Copy main.lua to assets
      run: |
        if [ -f "main.lua" ]; then
          echo "✅ Found main.lua in root, copying to assets/"
          cp main.lua assets/main.lua
        else
          echo "❌ main.lua not found in root!"
          exit 1
        fi

    - name: Create AndroidManifest.xml
      run: |
        cat > android/AndroidManifest.xml << 'EOF'
        <?xml version="1.0" encoding="utf-8"?>
        <manifest xmlns:android="http://schemas.android.com/apk/res/android"
            package="com.luna2d.game"
            android:versionCode="1"
            android:versionName="1.0">
            <uses-permission android:name="android.permission.INTERNET" />
            <uses-feature android:glEsVersion="0x00020000" android:required="true" />
            <application
                android:label="Luna2D Game"
                android:allowBackup="true"
                android:hasCode="false"
                android:extractNativeLibs="true">
                <activity
                    android:name="android.app.NativeActivity"
                    android:configChanges="orientation|keyboardHidden|screenSize"
                    android:screenOrientation="sensorLandscape"
                    android:exported="true">
                    <meta-data
                        android:name="android.app.lib_name"
                        android:value="luna2d" />
                    <intent-filter>
                        <action android:name="android.intent.action.MAIN" />
                        <category android:name="android.intent.category.LAUNCHER" />
                    </intent-filter>
                </activity>
            </application>
        </manifest>
        EOF

    - name: Create Android CMakeLists.txt
      run: |
        cat > android/CMakeLists.txt << 'EOF'
        cmake_minimum_required(VERSION 3.11)
        project(Luna2D)
        set(CMAKE_CXX_STANDARD 17)
        set(CMAKE_CXX_STANDARD_REQUIRED ON)
        set(THIRD_PARTY_DIR ${CMAKE_CURRENT_SOURCE_DIR}/../third_party)
        add_subdirectory(${THIRD_PARTY_DIR}/raylib ${CMAKE_CURRENT_BINARY_DIR}/raylib)
        add_subdirectory(${THIRD_PARTY_DIR}/box2d ${CMAKE_CURRENT_BINARY_DIR}/box2d)
        include_directories(${THIRD_PARTY_DIR}/LuaJIT/src)
        add_library(luna2d SHARED ${CMAKE_CURRENT_SOURCE_DIR}/../src/main.cpp)
        target_link_libraries(luna2d raylib box2d ${CMAKE_CURRENT_SOURCE_DIR}/../luajit_build/${ANDROID_ABI}/libluajit.a log android EGL GLESv2 OpenSLES z)
        target_include_directories(luna2d PRIVATE ${CMAKE_CURRENT_SOURCE_DIR}/../src ${THIRD_PARTY_DIR}/raylib/src ${THIRD_PARTY_DIR}/box2d/include ${THIRD_PARTY_DIR}/LuaJIT/src)
        set_target_properties(luna2d PROPERTIES CXX_STANDARD 17 CXX_STANDARD_REQUIRED ON POSITION_INDEPENDENT_CODE ON)
        EOF

    - name: Build LuaJIT for all ABIs
      run: |
        NDKPATH=$ANDROID_NDK_HOME
        NDKBIN=$NDKPATH/toolchains/llvm/prebuilt/linux-x86_64/bin
        export PATH=$NDKBIN:$PATH
        
        mkdir -p luajit_build/arm64-v8a
        mkdir -p luajit_build/armeabi-v7a
        mkdir -p luajit_build/x86_64
        mkdir -p luajit_build/x86
        
        build_luajit() {
          ARCH=$1
          TARGET=$2
          DEST_DIR=$3
          
          echo "=== Building LuaJIT for $ARCH ($TARGET) ==="
          cd third_party/LuaJIT
          make clean
          
          # Используем более простой способ сборки
          if [ "$ARCH" = "arm64" ]; then
            make HOST_CC="gcc" \
                 CROSS="$NDKBIN/aarch64-linux-android-" \
                 TARGET_CFLAGS="-fPIC" \
                 TARGET_SYS=Android \
                 BUILDMODE=static \
                 -j$(nproc)
          elif [ "$ARCH" = "arm" ]; then
            make HOST_CC="gcc -m32" \
                 CROSS="$NDKBIN/armv7a-linux-androideabi-" \
                 TARGET_CFLAGS="-fPIC" \
                 TARGET_SYS=Android \
                 BUILDMODE=static \
                 -j$(nproc)
          elif [ "$ARCH" = "x86_64" ]; then
            make HOST_CC="gcc" \
                 CROSS="$NDKBIN/x86_64-linux-android-" \
                 TARGET_CFLAGS="-fPIC" \
                 TARGET_SYS=Android \
                 BUILDMODE=static \
                 -j$(nproc)
          elif [ "$ARCH" = "x86" ]; then
            make HOST_CC="gcc -m32" \
                 CROSS="$NDKBIN/i686-linux-android-" \
                 TARGET_CFLAGS="-fPIC" \
                 TARGET_SYS=Android \
                 BUILDMODE=static \
                 -j$(nproc)
          fi
          
          cp src/libluajit.a ../../luajit_build/$DEST_DIR/
          cd ../..
        }

        build_luajit "arm64" "aarch64-linux-android29" "arm64-v8a"
        build_luajit "arm" "armv7a-linux-androideabi29" "armeabi-v7a"
        build_luajit "x86_64" "x86_64-linux-android29" "x86_64"
        build_luajit "x86" "i686-linux-android29" "x86"

    - name: Build Luna2D Engine
      run: |
        ABIS=("arm64-v8a" "armeabi-v7a" "x86" "x86_64")
        for ABI in "${ABIS[@]}"
        do
          echo "=== Building for ABI: $ABI ==="
          mkdir -p build_$ABI
          cd build_$ABI
          cmake ../android \
            -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=$ABI \
            -DANDROID_PLATFORM=android-29 \
            -DPLATFORM=Android \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_EXAMPLES=OFF \
            -DANDROID_ABI=$ABI \
            -DLUAJIT_LIB_DIR=${{ github.workspace }}/luajit_build/$ABI
          make -j$(nproc)
          cd ..
        done

    - name: Package APK
      run: |
        mkdir -p apk-build/lib/arm64-v8a
        mkdir -p apk-build/lib/armeabi-v7a
        mkdir -p apk-build/lib/x86
        mkdir -p apk-build/lib/x86_64
        mkdir -p apk-build/assets
        cp assets/main.lua apk-build/assets/main.lua
        cp build_arm64-v8a/libluna2d.so apk-build/lib/arm64-v8a/libluna2d.so
        cp build_armeabi-v7a/libluna2d.so apk-build/lib/armeabi-v7a/libluna2d.so
        cp build_x86/libluna2d.so apk-build/lib/x86/libluna2d.so
        cp build_x86_64/libluna2d.so apk-build/lib/x86_64/libluna2d.so
        ${ANDROID_SDK_ROOT}/build-tools/33.0.2/aapt2 link \
          -o luna2d-unaligned.apk \
          -I ${ANDROID_SDK_ROOT}/platforms/android-29/android.jar \
          --manifest android/AndroidManifest.xml \
          --min-sdk-version 21 \
          --target-sdk-version 29 \
          apk-build
        ${ANDROID_SDK_ROOT}/build-tools/33.0.2/zipalign -f -v 4 luna2d-unaligned.apk Luna2D.apk
        keytool -genkey -v -keystore debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US" -noprompt
        ${ANDROID_SDK_ROOT}/build-tools/33.0.2/apksigner sign --ks debug.keystore --ks-pass pass:android --out Luna2D_Release.apk Luna2D.apk

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: Luna2D-Android
        path: Luna2D_Release.apk
        compression-level: 0
